<!DOCTYPE html>
<html>

<head>

  <title>Admin Login</title>

  <style>

    body{
      background:#0f172a;
      font-family:Arial;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .box{
      width:350px;
      background:#1e293b;
      padding:30px;
      border-radius:12px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#6366f1;
      color:white;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="box">

    <h2>Admin Login</h2>

    <input
      id="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

  </div>

  <script>

    const BASE =
      "https://ailearnifyapp-tbrt.onrender.com";

    async function login(){

      const email =
        document.getElementById("email").value;

      const password =
        document.getElementById("password").value;

      const res = await fetch(
        BASE + "/admin/login",
        {
          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({
            email,
            password
          })
        }
      );

      const data = await res.json();

      if(data.success){

        localStorage.setItem(
          "adminToken",
          data.token
        );

        window.location.href =
          "admin.html";

      }else{

        alert(data.message);

      }

    }

  </script>

</body>

</html>
